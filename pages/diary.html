<html lang="es">

      margin: 0;
      font-family: "Courier New", monospace;
      background: #f5f5f5;

    .sidebar {
      position: fixed;
      top: 0;

      height: 100vh;
      padding: 20px;

      border-right: 1px solid #ccc;
      overflow-y: auto;
    }

    .sidebar h2 {
      font-size: 16px;
      margin-bottom: 20px;
    }

    /* LISTA */
    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    li {
      margin-bottom: 8px;
    }

    a {
      color: #333;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    /* CONTENIDO */
    .content {
      margin-left: 260px;
      padding: 40px;
      max-width: 700px;
      line-height: 1.6;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 20px;
    }

</head>
